<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Greentech Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #interactive { width: 100%; height: 100vh; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        /* Зелена рамка фокусу */
        .overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 260px; height: 160px; border: 2px solid #00ff00; border-radius: 12px;
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.5); pointer-events: none;
        }
        .status-box {
            position: absolute; bottom: 40px; width: 100%; text-align: center;
            color: #fff; font-size: 18px; z-index: 10; text-shadow: 1px 1px 2px #000;
        }
    </style>
</head>
<body>

<div id="interactive"></div>
<div class="overlay"></div>
<div class="status-box" id="status">Наведіть на штрих-код</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let isDetected = false;

    Quagga.init({
        inputStream: {
            name: "Live",
            type: "LiveStream",
            target: document.querySelector('#interactive'),
            constraints: { 
                facingMode: "environment",
                width: { min: 640 },
                height: { min: 480 }
            }
        },
        decoder: {
            readers: ["code_128_reader", "ean_reader", "code_39_reader"]
        },
        locate: true
    }, function(err) {
        if (err) {
            console.error(err);
            document.getElementById('status').innerText = "Помилка камери";
            return;
        }
        Quagga.start();
    });

    Quagga.onDetected(function(result) {
        if (isDetected) return;
        
        const code = result.codeResult.code;
        if (code && code.length > 3) {
            isDetected = true;
            document.getElementById('status').innerText = "Зчитано: " + code;
            
            // ВІБРАЦІЯ ТА ВІДПРАВКА
            if (navigator.vibrate) navigator.vibrate(100);
            
            tg.sendData(code);
            
            // Закриваємо через невелику паузу для успішного відправлення
            setTimeout(() => {
                tg.close();
            }, 600);
        }
    });
</script>

</body>
</html>
