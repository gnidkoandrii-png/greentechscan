<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Greentech Professional Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; }
        #video-container { position: relative; width: 100%; height: 80vh; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 250px; height: 150px; border: 2px solid #00ff00; border-radius: 15px; box-shadow: 0 0 20px rgba(0,255,0,0.5); pointer-events: none; }
        .ui { padding: 15px; text-align: center; background: #1a1a1a; flex-grow: 1; }
        .status { font-size: 14px; color: #00ff00; margin-bottom: 10px; }
        button { background: #444; color: white; border: none; padding: 10px 20px; border-radius: 8px; }
    </style>
</head>
<body>

<div id="video-container">
    <video id="video" playsinline></video>
    <div class="overlay"></div>
</div>

<div class="ui">
    <div id="status" class="status">Шукаю код (Greentech)...</div>
    <button onclick="location.reload()">🔄 ПЕРЕЗАПУСТИТИ</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const video = document.getElementById('video');
    const status = document.getElementById('status');
    let isProcessing = false;

    // Функція фільтрації та розбору коду
    function processScannedData(data) {
        if (isProcessing) return;

        // 1. Ігноруємо посилання (http, https, www)
        const urlPattern = /^(http|https|www|ftp):\/\/[^\s/$.?#].[^\s]*$/i;
        if (urlPattern.test(data.trim())) {
            console.log("Ігнорую посилання:", data);
            return;
        }

        isProcessing = true;

        // 2. Розбиваємо "складні" коди (якщо вшито кілька через пробіл, кому або крапку з комою)
        // Наприклад: "SN123,SN456,SN789" -> ["SN123", "SN456", "SN789"]
        let codes = data.split(/[\s,;]+/).filter(c => c.length > 2);

        if (codes.length > 0) {
            status.innerText = "✅ Зчитано: " + codes.join(", ");
            status.style.color = "#ffff00";

            // Відправляємо боту (якщо кодів кілька, відправляємо їх через розділювач)
            tg.sendData(codes.join("|")); 
            
            setTimeout(() => {
                tg.close();
            }, 500);
        } else {
            isProcessing = false;
        }
    }

    // Налаштування камери
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(function(stream) {
        video.srcObject = stream;
        video.setAttribute("playsinline", true);
        video.play();
        requestAnimationFrame(tick);
    });

    function tick() {
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            const canvasElement = document.createElement("canvas");
            const canvas = canvasElement.getContext("2d");
            canvasElement.height = video.videoHeight;
            canvasElement.width = video.videoWidth;
            canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
            
            const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);

            // АЛГОРИТМ 1: Пошук QR-коду
            const qrCode = jsQR(imageData.data, imageData.width, imageData.height, {
                inversionAttempts: "dontInvert",
            });

            if (qrCode && qrCode.data) {
                processScannedData(qrCode.data);
            }

            // АЛГОРИТМ 2: Пошук штрих-коду (якщо QR не знайдено)
            if (!isProcessing) {
                Quagga.decodeSingle({
                    src: canvasElement.toDataURL(),
                    decoder: {
                        readers: ["code_128_reader", "ean_reader", "code_39_reader"]
                    },
                    locate: true
                }, function(result) {
                    if (result && result.codeResult) {
                        processScannedData(result.codeResult.code);
                    }
                });
            }
        }
        if (!isProcessing) requestAnimationFrame(tick);
    }
</script>

</body>
</html>
