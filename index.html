<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Сканер Greentech</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- ZXing — використовуємо лише якщо у браузера немає нативного BarcodeDetector (типово для iOS Safari) -->
    <script src="https://unpkg.com/@zxing/[email protected]/umd/index.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #18222d;
        }
        body {
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
        }

        /* ---- КАМЕРА ---- */
        .cam-wrap {
            position: relative;
            width: 100%;
            background: #000;
            overflow: hidden;
            flex-shrink: 0;
            border-bottom: 3px solid #2ea6ff;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .cam-wrap video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .cam-wrap.flash-error {
            border-bottom-color: #ff3b30;
            box-shadow: inset 0 0 30px rgba(255, 59, 48, 0.7);
        }

        /* Рамка сканування */
        .scan-frame {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 88%;
            height: 60%;
            border: 3px solid rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            pointer-events: none;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.3);
        }

        /* Помилка камери */
        .cam-error {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 20px;
            color: #fff;
            background: rgba(0,0,0,0.85);
            text-align: center;
            font-size: 14px;
            z-index: 5;
        }
        .cam-error.show { display: flex; }

        /* ---- СТАТУС ---- */
        .stats {
            padding: 10px 15px;
            background: #18222d;
            border-bottom: 1px solid #2a3a4d;
            flex-shrink: 0;
        }
        .stats h2 {
            color: #4caf50;
            margin: 0 0 3px 0;
            font-size: 18px;
            font-weight: 700;
        }
        .stats p {
            color: #aaa;
            margin: 0;
            font-size: 13px;
            min-height: 18px;
        }

        /* ---- СПИСОК ---- */
        #codes-list {
            flex: 1 1 auto;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 8px 12px;
            background: #0f1720;
            text-align: left;
            min-height: 0;
        }
        .code-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            margin: 5px 0;
            background: #253344;
            border-radius: 8px;
            font-size: 14px;
            font-family: "SF Mono", Menlo, Consolas, monospace;
            animation: slideIn 0.2s ease-out;
        }
        .code-item.duplicate-flash {
            background: #5a1f1f;
            transition: background 0.5s;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .code-num {
            color: #2ea6ff;
            font-weight: 700;
            margin-right: 10px;
            flex-shrink: 0;
        }
        .code-text {
            flex-grow: 1;
            word-break: break-all;
            color: #fff;
        }
        .code-remove {
            background: #ff3b30; color: white;
            border: none; border-radius: 50%;
            width: 28px; height: 28px;
            font-size: 16px; cursor: pointer;
            flex-shrink: 0; margin-left: 10px;
            padding: 0; line-height: 1;
        }
        .empty-hint {
            color: #5a6a7a;
            text-align: center;
            padding: 25px 15px;
            font-style: italic;
        }

        /* ---- КНОПКА ---- */
        .btn {
            background: #2ea6ff; color: white; border: none;
            padding: 14px; font-size: 17px; border-radius: 10px;
            width: 92%; margin: 8px auto 20px auto;
            display: none; font-weight: 700;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            flex-shrink: 0;
            cursor: pointer;
        }
        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="cam-wrap" id="cam-wrap">
        <video id="video" autoplay playsinline muted></video>
        <div class="scan-frame"></div>
        <div class="cam-error" id="cam-error"></div>
    </div>

    <div class="stats">
        <h2 id="count-text">Відскановано: 0</h2>
        <p id="last-code">Наведіть рамку на код</p>
    </div>

    <div id="codes-list">
        <div class="empty-hint">Поки що нічого не відскановано</div>
    </div>

    <button class="btn" id="send-btn">📤 ПЕРЕДАТИ В БОТ</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ============ МАКЕТ ============
        function updateLayout() {
            const vh = tg.viewportStableHeight || tg.viewportHeight || window.innerHeight;
            const cameraHeight = Math.round(vh * 0.50);
            const camWrap = document.getElementById('cam-wrap');
            camWrap.style.height = cameraHeight + 'px';
            document.body.style.height = vh + 'px';
        }
        updateLayout();
        tg.onEvent('viewportChanged', updateLayout);
        window.addEventListener('resize', updateLayout);
        window.addEventListener('orientationchange', () => setTimeout(updateLayout, 300));

        // ============ СТАН ============
        let scannedList = [];
        let scannedSet = new Set();
        let lastDuplicateTime = 0;
        let lastLinkTime = 0;

        // ============ ФІЛЬТРИ ============
        function normalize(code) {
            return code.replace(/\s+/g, '').toUpperCase();
        }

        // Повертає true, якщо токен — це посилання, службовий QR чи просто текст без цифр
        function isUnwantedToken(sn) {
            if (!sn) return true;
            if (sn.length < 4) return true;
            // Серійний номер зазвичай містить хоча б одну цифру
            if (!/\d/.test(sn)) return true;

            const lower = sn.toLowerCase();

            // Явні схеми URI
            const schemes = [
                'http://', 'https://', 'ftp://', 'ftps://',
                'mailto:', 'tel:', 'sms:', 'smsto:',
                'geo:', 'maps:', 'bitcoin:', 'matmsg:',
                'wifi:', 'viber://', 'tg://', 'whatsapp://'
            ];
            for (const s of schemes) {
                if (lower.startsWith(s)) return true;
            }

            // Візитки / календар
            if (/^begin:(vcard|vcalendar)/i.test(sn)) return true;
            if (/^mecard:/i.test(sn)) return true;

            // "www.щось"
            if (/^www\./i.test(sn)) return true;

            // Схоже на домен типу bit.ly/xyz або example.com/...
            if (/^[a-z0-9][a-z0-9-]*(\.[a-z0-9-]+)+\/\S*/i.test(sn)) return true;

            // Схоже на домен без шляху: example.com, t.me
            if (/^[a-z0-9][a-z0-9-]*\.(com|ua|net|org|io|me|ly|gg|ru|info|biz|app|dev|co|tv|cc|xyz|site|shop|store|online|link)$/i.test(sn)) return true;

            return false;
        }

        // ============ ЗВУК + ВІБРО ============
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioCtx();
        function beep(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            if (type === 'ok') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
                gain.gain.setValueAtTime(1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                gain.gain.setValueAtTime(1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        // ============ СПИСОК ============
        function renderList() {
            const listDiv = document.getElementById('codes-list');
            if (scannedList.length === 0) {
                listDiv.innerHTML = '<div class="empty-hint">Поки що нічого не відскановано</div>';
                document.getElementById('send-btn').style.display = 'none';
                return;
            }
            listDiv.innerHTML = '';
            scannedList.forEach((code, idx) => {
                const item = document.createElement('div');
                item.className = 'code-item';
                item.dataset.code = normalize(code);
                item.innerHTML = `
                    <span class="code-num">${idx + 1}.</span>
                    <span class="code-text"></span>
                    <button class="code-remove">×</button>
                `;
                item.querySelector('.code-text').textContent = code;
                item.querySelector('.code-remove').addEventListener('click', () => {
                    removeCode(normalize(code));
                });
                listDiv.appendChild(item);
            });
            listDiv.scrollTop = listDiv.scrollHeight;
            document.getElementById('send-btn').style.display = 'block';
        }

        function removeCode(normCode) {
            scannedList = scannedList.filter(c => normalize(c) !== normCode);
            scannedSet.delete(normCode);
            document.getElementById('count-text').textContent = 'Відскановано: ' + scannedList.length;
            renderList();
        }

        function flashDuplicate(normCode) {
            document.querySelectorAll('.code-item').forEach(item => {
                if (item.dataset.code === normCode) {
                    item.classList.add('duplicate-flash');
                    item.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    setTimeout(() => item.classList.remove('duplicate-flash'), 1000);
                }
            });
        }

        function flashCamError() {
            const wrap = document.getElementById('cam-wrap');
            wrap.classList.add('flash-error');
            setTimeout(() => wrap.classList.remove('flash-error'), 500);
        }

        // ============ ОБРОБКА ВІДСКАНОВАНОГО ============
        function handleScan(rawValues) {
            // rawValues — масив рядків, кожен з яких може містити один або кілька кодів (розділених пробілом/новим рядком/комою)
            const tokens = [];
            for (const rv of rawValues) {
                rv.split(/[\s,;]+/).forEach(t => {
                    t = t.trim();
                    if (t) tokens.push(t);
                });
            }
            if (tokens.length === 0) return;

            let addedCount = 0;
            let duplicates = [];
            let links = 0;

            tokens.forEach(sn => {
                if (isUnwantedToken(sn)) {
                    links++;
                    return;
                }
                const norm = normalize(sn);
                if (!scannedSet.has(norm)) {
                    scannedSet.add(norm);
                    scannedList.push(sn);
                    addedCount++;
                } else {
                    duplicates.push(norm);
                }
            });

            const now = Date.now();

            if (addedCount > 0) {
                beep('ok');
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                document.getElementById('count-text').textContent = 'Відскановано: ' + scannedList.length;
                if (addedCount > 1) {
                    document.getElementById('last-code').textContent = '📦 Додано ' + addedCount + ' шт. пакетом';
                } else {
                    document.getElementById('last-code').textContent = '✅ ' + scannedList[scannedList.length - 1];
                }
                renderList();
                return;
            }

            // Нічого не додано — або все посилання, або все дублі
            if (duplicates.length > 0 && now - lastDuplicateTime > 1500) {
                lastDuplicateTime = now;
                beep('err');
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                document.getElementById('last-code').textContent = '⚠️ Вже є у списку';
                flashCamError();
                flashDuplicate(duplicates[0]);
                return;
            }

            if (links > 0 && now - lastLinkTime > 1500) {
                lastLinkTime = now;
                document.getElementById('last-code').textContent = '🔗 Посилання/текст пропущено';
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            }
        }

        // ============ КАМЕРА + СКАНЕР ============
        const video = document.getElementById('video');
        const camError = document.getElementById('cam-error');

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: false,
                    video: {
                        facingMode: { ideal: 'environment' },
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    }
                });
                video.srcObject = stream;
                await video.play().catch(() => {});
                return true;
            } catch (err) {
                camError.textContent = 'Не вдалося відкрити камеру: ' + err.message +
                    '. Перевірте дозволи у налаштуваннях.';
                camError.classList.add('show');
                return false;
            }
        }

        // Два рушії декодування: нативний і ZXing
        async function startNativeDetector() {
            let formats;
            try {
                formats = await BarcodeDetector.getSupportedFormats();
            } catch (e) { formats = []; }

            let detector;
            try {
                detector = new BarcodeDetector({
                    formats: formats.length ? formats : [
                        'qr_code', 'ean_13', 'ean_8',
                        'code_128', 'code_39', 'code_93',
                        'upc_a', 'upc_e', 'itf',
                        'data_matrix', 'pdf417', 'aztec', 'codabar'
                    ]
                });
            } catch (e) {
                detector = new BarcodeDetector();
            }

            let running = true;
            const loop = async () => {
                if (!running) return;
                if (video.readyState >= 2) {
                    try {
                        const codes = await detector.detect(video);
                        if (codes && codes.length > 0) {
                            handleScan(codes.map(c => c.rawValue).filter(Boolean));
                        }
                    } catch (e) { /* ignore frame errors */ }
                }
                // ~10 fps, щоб не грузити CPU
                setTimeout(() => requestAnimationFrame(loop), 100);
            };
            requestAnimationFrame(loop);
        }

        async function startZXing() {
            if (!window.ZXingBrowser) {
                camError.textContent = 'Не вдалося завантажити декодер. Перевірте інтернет і перезапустіть.';
                camError.classList.add('show');
                return;
            }
            const hints = new Map();
            // Список форматів
            const formats = [
                ZXingBrowser.BarcodeFormat.QR_CODE,
                ZXingBrowser.BarcodeFormat.EAN_13,
                ZXingBrowser.BarcodeFormat.EAN_8,
                ZXingBrowser.BarcodeFormat.CODE_128,
                ZXingBrowser.BarcodeFormat.CODE_39,
                ZXingBrowser.BarcodeFormat.CODE_93,
                ZXingBrowser.BarcodeFormat.UPC_A,
                ZXingBrowser.BarcodeFormat.UPC_E,
                ZXingBrowser.BarcodeFormat.ITF,
                ZXingBrowser.BarcodeFormat.DATA_MATRIX,
                ZXingBrowser.BarcodeFormat.PDF_417,
                ZXingBrowser.BarcodeFormat.AZTEC,
                ZXingBrowser.BarcodeFormat.CODABAR
            ];
            hints.set(ZXingBrowser.DecodeHintType.POSSIBLE_FORMATS, formats);
            hints.set(ZXingBrowser.DecodeHintType.TRY_HARDER, true);

            const reader = new ZXingBrowser.BrowserMultiFormatReader(hints);

            // ZXing сам керує відео-елементом: підключимо до нашого <video>
            // Використовуємо decodeFromVideoElement, бо камеру вже відкрили своїм кодом
            reader.decodeFromVideoElement(video, (result, err) => {
                if (result) {
                    handleScan([result.getText()]);
                }
                // err — це норм, означає що в поточному кадрі код не знайдено
            });
        }

        async function init() {
            const cameraOk = await startCamera();
            if (!cameraOk) return;

            // Обираємо рушій
            if ('BarcodeDetector' in window) {
                startNativeDetector();
            } else {
                startZXing();
            }
        }

        init();

        // ============ КНОПКА ПЕРЕДАЧІ ============
        document.getElementById('send-btn').addEventListener('click', () => {
            if (scannedList.length > 0) {
                tg.sendData(scannedList.join('|'));
            }
        });
    </script>
</body>
</html>
