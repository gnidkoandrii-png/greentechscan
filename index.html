<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Greentech Multi-Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #video-container { position: relative; width: 100%; height: 50vh; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .scan-region { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 260px; height: 140px; border: 2px solid #ffff00; border-radius: 15px; box-shadow: 0 0 15px rgba(255,255,0,0.3); pointer-events: none; }
        
        .list-panel { flex-grow: 1; background: #1a1a1a; padding: 10px; display: flex; flex-direction: column; border-top: 2px solid #333; }
        .counter { font-size: 18px; font-weight: bold; color: #ffff00; text-align: center; margin-bottom: 5px; }
        #codes-list { flex-grow: 1; overflow-y: auto; background: #000; border-radius: 8px; padding: 10px; font-size: 14px; color: #ccc; border: 1px solid #333; }
        .code-item { border-bottom: 1px solid #222; padding: 5px 0; display: flex; justify-content: space-between; }
        
        .footer-btns { display: flex; gap: 10px; padding-top: 10px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
        #send-btn { background: #28a745; color: white; }
        #clear-btn { background: #dc3545; color: white; flex: 0.4; }
    </style>
</head>
<body>

<div id="video-container">
    <video id="video" playsinline></video>
    <div class="scan-region"></div>
</div>

<div class="list-panel">
    <div class="counter">📦 Зібрано: <span id="count">0</span> шт.</div>
    <div id="codes-list">Тут з'являться серійні номери...</div>
    
    <div class="footer-btns">
        <button id="clear-btn" onclick="clearList()">🗑</button>
        <button id="send-btn" onclick="sendToBot()">✅ ВІДПРАВИТИ В БОТ</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const video = document.getElementById('video');
    const codesList = document.getElementById('codes-list');
    const countDisplay = document.getElementById('count');
    
    let scannedCodes = new Set(); // Використовуємо Set, щоб не було дублікатів
    let lastScanned = "";
    let throttleTimeout = false;

    function addCode(code) {
        if (throttleTimeout || scannedCodes.has(code)) return;
        
        // Ігноруємо посилання
        if (/^(http|https|www)/i.test(code.trim())) return;

        // Додаємо в список
        scannedCodes.add(code);
        updateUI();

        // Вібровідгук (якщо підтримується)
        if (navigator.vibrate) navigator.vibrate(50);

        // Пауза 1.5 сек, щоб не зчитати один і той же код двічі поспіль
        throttleTimeout = true;
        setTimeout(() => { throttleTimeout = false; }, 1500);
    }

    function updateUI() {
        countDisplay.innerText = scannedCodes.size;
        if (scannedCodes.size === 0) {
            codesList.innerHTML = "Тут з'являться серійні номери...";
            return;
        }
        codesList.innerHTML = Array.from(scannedCodes).reverse().map(c => 
            `<div class="code-item"><span>${c}</span><span style="color: #28a745">✔</span></div>`
        ).join("");
    }

    function clearList() {
        if (confirm("Очистити список?")) {
            scannedCodes.clear();
            updateUI();
        }
    }

    function sendToBot() {
        if (scannedCodes.size === 0) {
            alert("Спочатку відскануйте хоча б один товар!");
            return;
        }
        const dataToSend = Array.from(scannedCodes).join("|");
        tg.sendData(dataToSend);
        tg.close();
    }

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(function(stream) {
        video.srcObject = stream;
        video.play();
        requestAnimationFrame(tick);
    });

    function tick() {
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            const canvasElement = document.createElement("canvas");
            const canvas = canvasElement.getContext("2d");
            canvasElement.height = video.videoHeight;
            canvasElement.width = video.videoWidth;
            canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
            const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);

            // QR
            const qrCode = jsQR(imageData.data, imageData.width, imageData.height);
            if (qrCode) {
                addCode(qrCode.data);
            } else {
                // Штрих-код
                Quagga.decodeSingle({
                    src: canvasElement.toDataURL(),
                    decoder: { readers: ["code_128_reader", "ean_reader", "code_39_reader"] },
                    locate: true
                }, (result) => {
                    if (result && result.codeResult) addCode(result.codeResult.code);
                });
            }
        }
        requestAnimationFrame(tick);
    }
</script>

</body>
</html>
