<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Greentech Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #interactive { width: 100%; height: 100vh; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 250px; height: 150px; border: 2px solid #00ff00; border-radius: 10px;
            box-shadow: 0 0 0 500px rgba(0, 0, 0, 0.5); pointer-events: none;
        }
        .status {
            position: absolute; bottom: 50px; width: 100%; text-align: center;
            color: #fff; font-size: 18px; z-index: 10; font-weight: bold;
        }
    </style>
</head>
<body>

<div id="interactive"></div>
<div class="overlay"></div>
<div class="status" id="status">Шукаю штрих-код...</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let isScanning = true;

    Quagga.init({
        inputStream: {
            name: "Live",
            type: "LiveStream",
            target: document.querySelector('#interactive'),
            constraints: { facingMode: "environment" }
        },
        decoder: {
            readers: ["code_128_reader", "ean_reader", "code_39_reader"]
        },
        locate: true
    }, function(err) {
        if (err) {
            console.error(err);
            alert("Помилка камери");
            return;
        }
        Quagga.start();
    });

    Quagga.onDetected(function(result) {
        if (!isScanning) return;
        
        const code = result.codeResult.code;
        if (code) {
            isScanning = false;
            document.getElementById('status').innerText = "Зчитано: " + code;
            
            // Відправляємо в бот і закриваємо
            tg.sendData(code);
            
            if (navigator.vibrate) navigator.vibrate(100);
            
            setTimeout(() => {
                tg.close();
            }, 500);
        }
    });
</script>

</body>
</html>
