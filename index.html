<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Scanner — серійники</title>
  <style>
    body{font-family:Arial;margin:16px}
    #video{width:320px;height:240px;border:1px solid #ccc}
    #list{margin-top:12px}
    .item{display:flex;align-items:center;justify-content:space-between;padding:6px;border-bottom:1px solid #eee}
    .code{font-family:monospace}
    button{margin-left:8px}
  </style>
</head>
<body>
  <h3>Сканер штрих/QR кодів</h3>
  <div>
    <button id="startBtn">Запустити сканер</button>
    <button id="stopBtn" disabled>Зупинити</button>
  </div>
  <video id="video" muted playsinline></video>
  <div id="status"></div>
  <div id="list"></div>

  <script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>
  <script>
    const codeReader = new ZXing.BrowserMultiFormatReader();
    const videoElem = document.getElementById('video');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const status = document.getElementById('status');
    const list = document.getElementById('list');
    let controls;

    function addSerial(serial) {
      serial = serial.trim();
      if(!serial) return;
      // унікальність
      if(document.querySelector(`[data-code="${CSS.escape(serial)}"]`)) return;
      const row = document.createElement('div');
      row.className = 'item';
      row.dataset.code = serial;
      row.innerHTML = `<span class="code">${serial}</span><div><button class="del">Видалити</button></div>`;
      row.querySelector('.del').addEventListener('click', ()=> row.remove());
      list.prepend(row);
    }

    function parseAndAdd(text) {
      // Роздільники: новий рядок, кома, крапка з комою, пробіл
      const parts = text.split(/[\r\n,;]+|\s+/).map(s=>s.trim()).filter(Boolean);
      // Якщо в QR закодовано один рядок з 30 серійниками, parts.length буде 30
      parts.forEach(addSerial);
      status.textContent = `Додано ${parts.length} серійників`;
    }

    startBtn.addEventListener('click', async () => {
      startBtn.disabled = true;
      status.textContent = 'Запит доступу до камери...';
      try {
        const devices = await codeReader.listVideoInputDevices();
        const deviceId = devices.length ? devices[0].deviceId : undefined;
        controls = await codeReader.decodeFromVideoDevice(deviceId, videoElem, (result, err) => {
          if (result) {
            // Результат текстовий
            parseAndAdd(result.getText());
          }
          if (err && !(err instanceof ZXing.NotFoundException)) {
            console.error(err);
          }
        });
        stopBtn.disabled = false;
        status.textContent = 'Сканер запущено';
      } catch (e) {
        console.error(e);
        status.textContent = 'Помилка доступу до камери: ' + e.message;
        startBtn.disabled = false;
      }
    });

    stopBtn.addEventListener('click', () => {
      codeReader.reset();
      videoElem.srcObject = null;
      startBtn.disabled = false;
      stopBtn.disabled = true;
      status.textContent = 'Сканер зупинено';
    });
  </script>
</body>
</html>
