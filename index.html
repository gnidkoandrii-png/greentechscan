<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Greentech Smart Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #video-container { position: relative; width: 100%; height: 65vh; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .scan-region { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 260px; height: 160px; border: 2px solid #007bff; border-radius: 15px; box-shadow: 0 0 15px rgba(0,123,255,0.5); pointer-events: none; }
        
        .result-panel { 
            flex-grow: 1; background: #1a1a1a; padding: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-top: 2px solid #333;
        }
        #result-text { font-size: 16px; margin-bottom: 15px; color: #aaa; text-align: center; word-break: break-all; max-height: 60px; overflow-y: auto; width: 100%; }
        .btn-group { display: flex; gap: 10px; width: 100%; }
        button { flex: 1; padding: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
        #send-btn { background: #28a745; color: white; display: none; }
        #reset-btn { background: #444; color: white; }
    </style>
</head>
<body>

<div id="video-container">
    <video id="video" playsinline></video>
    <div class="scan-region"></div>
</div>

<div class="result-panel">
    <div id="result-text">Наведіть камеру на код...</div>
    <div class="btn-group">
        <button id="reset-btn" onclick="resetScanner()">🔄 ЗАНОВО</button>
        <button id="send-btn" onclick="sendToBot()">✅ ВІДПРАВИТИ</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const video = document.getElementById('video');
    const resultText = document.getElementById('result-text');
    const sendBtn = document.getElementById('send-btn');
    
    let currentCode = "";
    let isLocked = false;

    function processData(data) {
        if (isLocked) return;

        // Ігноруємо посилання
        const urlPattern = /^(http|https|www|ftp):\/\/[^\s/$.?#].[^\s]*$/i;
        if (urlPattern.test(data.trim())) return;

        // Розбиваємо складні коди
        let codes = data.split(/[\s,;]+/).filter(c => c.length > 2);
        
        if (codes.length > 0) {
            isLocked = true; // Зупиняємо сканування
            currentCode = codes.join("|");
            
            resultText.innerHTML = "<b>Зчитано коди:</b><br>" + codes.join("<br>");
            resultText.style.color = "#00ff00";
            sendBtn.style.display = "block"; // Показуємо кнопку відправки
        }
    }

    function resetScanner() {
        isLocked = false;
        currentCode = "";
        resultText.innerText = "Наведіть камеру на код...";
        resultText.style.color = "#aaa";
        sendBtn.style.display = "none";
    }

    function sendToBot() {
        if (currentCode) {
            tg.sendData(currentCode);
            tg.close();
        }
    }

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(function(stream) {
        video.srcObject = stream;
        video.play();
        requestAnimationFrame(tick);
    });

    function tick() {
        if (!isLocked && video.readyState === video.HAVE_ENOUGH_DATA) {
            const canvasElement = document.createElement("canvas");
            const canvas = canvasElement.getContext("2d");
            canvasElement.height = video.videoHeight;
            canvasElement.width = video.videoWidth;
            canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
            const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);

            // Шукаємо QR
            const qrCode = jsQR(imageData.data, imageData.width, imageData.height);
            if (qrCode) {
                processData(qrCode.data);
            } else {
                // Шукаємо Штрих-код
                Quagga.decodeSingle({
                    src: canvasElement.toDataURL(),
                    decoder: { readers: ["code_128_reader", "ean_reader"] },
                    locate: true
                }, (result) => {
                    if (result && result.codeResult) processData(result.codeResult.code);
                });
            }
        }
        requestAnimationFrame(tick);
    }
</script>

</body>
</html>
