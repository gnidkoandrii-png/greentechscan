<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Greentech Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background: #18222d; color: white; margin: 0; padding: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #reader { width: 100%; height: 45vh; background: #000; border-bottom: 3px solid #2ea6ff; transition: border 0.2s, box-shadow 0.2s; }
        .error-flash { border-bottom: 6px solid #ff3b30 !important; box-shadow: inset 0 -20px 30px rgba(255, 59, 48, 0.5); }

        .list-container { flex-grow: 1; padding: 10px; display: flex; flex-direction: column; background: #121a22; overflow: hidden; }
        .stats-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid #333; }
        .stats-header h3 { margin: 0; color: #4caf50; }
        
        #codes-list { flex-grow: 1; overflow-y: auto; padding-right: 5px; }
        .code-item { display: flex; justify-content: space-between; align-items: center; background: #1e2a38; margin-bottom: 8px; padding: 12px; border-radius: 8px; border-left: 4px solid #2ea6ff; }
        .code-text { font-family: monospace; font-size: 15px; word-break: break-all; }
        .delete-btn { color: #ff3b30; font-size: 20px; font-weight: bold; padding: 5px 10px; cursor: pointer; }

        .btn-wrapper { padding: 15px; background: #18222d; }
        .btn { background: #2ea6ff; color: white; border: none; padding: 16px; font-size: 18px; border-radius: 10px; width: 100%; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: none; }
    </style>
</head>
<body>
    <div id="reader"></div>
    
    <div class="list-container">
        <div class="stats-header">
            <h3>Зібрано: <span id="count-val">0</span></h3>
            <span id="status-text" style="color:#aaa; font-size:14px;">Наведіть камеру...</span>
        </div>
        <div id="codes-list"></div>
    </div>

    <div class="btn-wrapper">
        <button class="btn" id="send-btn" onclick="sendData()">📤 ВІДПРАВИТИ В БОТ</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        let scannedCodes = []; 
        let lastErrorTime = 0;

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'success') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(1000, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'error') {
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(200, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.3);
            }
        }

        function updateUI() {
            document.getElementById('count-val').innerText = scannedCodes.length;
            const listDiv = document.getElementById('codes-list');
            const btn = document.getElementById('send-btn');
            
            if (scannedCodes.length > 0) {
                btn.style.display = "block";
                listDiv.innerHTML = scannedCodes.map((code, index) => `
                    <div class="code-item">
                        <span class="code-text">${code}</span>
                        <span class="delete-btn" onclick="removeCode(${index})">✕</span>
                    </div>
                `).join('');
            } else {
                btn.style.display = "none";
                listDiv.innerHTML = "<div style='text-align:center; color:#555; margin-top:20px;'>Список порожній</div>";
            }
        }

        window.removeCode = function(index) {
            scannedCodes.splice(index, 1);
            updateUI();
        };

        const html5QrCode = new Html5Qrcode("reader");
        const config = { 
            fps: 30,
            qrbox: function(vw, vh) { 
                // Робимо рамку достатньо високою для QR і широкою для Deye
                return { width: vw * 0.85, height: Math.min(vh * 0.45, 250) }; 
            },
            experimentalFeatures: { useBarCodeDetectorIfSupported: true },
            formatsToSupport: [ 
                Html5QrcodeSupportedFormats.QR_CODE, // Читає всі QR-коди
                Html5QrcodeSupportedFormats.CODE_128, 
                Html5QrcodeSupportedFormats.CODE_39, 
                Html5QrcodeSupportedFormats.EAN_13 
            ]
        };

        html5QrCode.start(
            { facingMode: "environment" }, 
            config,
            (decodedText) => {
                // РОЗУМНЕ РОЗРІЗАННЯ: Якщо в одному QR є 36 номерів через кому, пробіл чи новий рядок - він їх розділить
                let serials = decodedText.split(/[\s,;|\n\r]+/);
                let addedAny = false;
                let hasDuplicates = false;

                serials.forEach(sn => {
                    sn = sn.trim();
                    // 1. Ігноруємо посилання на сайти
                    if (/^https?:\/\/|www\./i.test(sn)) return; 
                    // 2. Ігноруємо текст без цифр
                    if (!/\d/.test(sn)) return; 
                    // 3. Ігноруємо надто короткі артефакти
                    if (sn.length < 4) return;

                    if (!scannedCodes.includes(sn)) {
                        scannedCodes.unshift(sn);
                        addedAny = true;
                    } else {
                        hasDuplicates = true;
                    }
                });

                let now = Date.now();

                if (addedAny) {
                    playSound('success');
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    
                    if (serials.length > 1) {
                        document.getElementById('status-text').innerText = `✅ Додано пакетом (${serials.length} шт)`;
                    } else {
                        document.getElementById('status-text').innerText = "✅ Додано";
                    }
                    
                    document.getElementById('status-text').style.color = "#4caf50";
                    updateUI();
                } 
                else if (hasDuplicates && (now - lastErrorTime > 2000)) {
                    lastErrorTime = now;
                    playSound('error');
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                    
                    document.getElementById('status-text').innerText = "⚠️ Вже є в списку!";
                    document.getElementById('status-text').style.color = "#ff3b30";
                    
                    let readerDiv = document.getElementById('reader');
                    readerDiv.classList.add('error-flash');
                    setTimeout(() => readerDiv.classList.remove('error-flash'), 500);
                }
            },
            (errorMessage) => {}
        ).catch((err) => {
            document.getElementById('status-text').innerText = "Помилка камери";
        });

        window.sendData = function() {
            if (scannedCodes.length > 0) {
                tg.sendData(scannedCodes.join('|'));
                tg.close();
            }
        }
        
        updateUI(); 
    </script>
</body>
</html>
