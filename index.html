<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Greentech Multi-Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #video-container { position: relative; width: 100%; height: 45vh; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .scan-region { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 260px; height: 120px; border: 2px solid #ffff00; border-radius: 15px; box-shadow: 0 0 15px rgba(255,255,0,0.3); pointer-events: none; }
        
        .list-panel { flex-grow: 1; background: #1a1a1a; padding: 10px; display: flex; flex-direction: column; border-top: 2px solid #333; }
        .counter { font-size: 18px; font-weight: bold; color: #ffff00; text-align: center; margin-bottom: 8px; }
        #codes-list { flex-grow: 1; overflow-y: auto; background: #080808; border-radius: 8px; padding: 5px; font-size: 15px; border: 1px solid #333; }
        
        .code-item { 
            background: #222; margin-bottom: 5px; padding: 10px; border-radius: 6px;
            display: flex; justify-content: space-between; align-items: center;
            border-left: 4px solid #28a745;
        }
        .remove-btn { 
            color: #ff4d4d; font-size: 20px; font-weight: bold; padding: 0 10px; cursor: pointer;
        }
        
        .footer-btns { display: flex; gap: 10px; padding-top: 10px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
        #send-btn { background: #28a745; color: white; }
        #clear-btn { background: #444; color: white; flex: 0.3; }
    </style>
</head>
<body>

<div id="video-container">
    <video id="video" playsinline></video>
    <div class="scan-region"></div>
</div>

<div class="list-panel">
    <div class="counter">📦 Зібрано: <span id="count">0</span> шт.</div>
    <div id="codes-list">Список порожній...</div>
    
    <div class="footer-btns">
        <button id="clear-btn" onclick="clearList()">🗑</button>
        <button id="send-btn" onclick="sendToBot()">✅ ВІДПРАВИТИ (<span id="btn-count">0</span>)</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const video = document.getElementById('video');
    const codesList = document.getElementById('codes-list');
    const countDisplay = document.getElementById('count');
    const btnCountDisplay = document.getElementById('btn-count');
    
    let scannedCodes = []; // Використовуємо масив для збереження черговості
    let throttleTimeout = false;

    function addCode(code) {
        if (throttleTimeout || scannedCodes.includes(code)) return;
        
        // Ігноруємо посилання та пусті рядки
        if (/^(http|https|www)/i.test(code.trim()) || code.length < 3) return;

        scannedCodes.unshift(code); // Додаємо новий код на початок списку
        updateUI();

        if (navigator.vibrate) navigator.vibrate(40);

        // Пауза 1.2 сек між скануваннями
        throttleTimeout = true;
        setTimeout(() => { throttleTimeout = false; }, 1200);
    }

    function removeCode(index) {
        scannedCodes.splice(index, 1);
        updateUI();
    }

    function updateUI() {
        countDisplay.innerText = scannedCodes.length;
        btnCountDisplay.innerText = scannedCodes.length;
        
        if (scannedCodes.length === 0) {
            codesList.innerHTML = "<div style='text-align:center; padding:20px; color:#555;'>Наведіть камеру на штрих-код...</div>";
            return;
        }

        codesList.innerHTML = scannedCodes.map((code, index) => `
            <div class="code-item">
                <span><code>${code}</code></span>
                <span class="remove-btn" onclick="removeCode(${index})">✖</span>
            </div>
        `).join("");
    }

    function clearList() {
        if (scannedCodes.length > 0 && confirm("Очистити весь список?")) {
            scannedCodes = [];
            updateUI();
        }
    }

    function sendToBot() {
        if (scannedCodes.length === 0) {
            alert("Список порожній!");
            return;
        }
        // Відправляємо коди боту через розділювач |
        tg.sendData(scannedCodes.join("|"));
        tg.close();
    }

    // Запуск камери
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(function(stream) {
        video.srcObject = stream;
        video.play();
        requestAnimationFrame(tick);
    }).catch(function(err) {
        alert("Помилка доступу до камери: " + err);
    });

    function tick() {
        if (video.readyState === video.HAVE_ENOUGH_DATA && !throttleTimeout) {
            const canvasElement = document.createElement("canvas");
            const canvas = canvasElement.getContext("2d");
            canvasElement.height = video.videoHeight;
            canvasElement.width = video.videoWidth;
            canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
            const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);

            // 1. QR-код
            const qrCode = jsQR(imageData.data, imageData.width, imageData.height);
            if (qrCode) {
                addCode(qrCode.data);
            } else {
                // 2. Штрих-код
                Quagga.decodeSingle({
                    src: canvasElement.toDataURL(),
                    decoder: { readers: ["code_128_reader", "ean_reader", "code_39_reader"] },
                    locate: true
                }, (result) => {
                    if (result && result.codeResult) addCode(result.codeResult.code);
                });
            }
        }
        requestAnimationFrame(tick);
    }
</script>

</body>
</html>
