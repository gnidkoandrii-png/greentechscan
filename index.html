<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Сканер Greentech</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            background: #18222d;
            color: white;
            text-align: center;
            font-family: sans-serif;
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
        }

        /* Камера: тільки рамка і фон. НЕ чіпаємо жорстко елементи всередині,
           бо на Android це ламає рендер відео */
        #reader {
            width: 100% !important;
            background: #000 !important;
            border: 0 !important;
            border-bottom: 3px solid #2ea6ff !important;
            padding: 0 !important;
            position: relative !important;
            overflow: hidden !important;
            flex-shrink: 0;
        }

        /* Сховати службові елементи бібліотеки */
        #reader__dashboard,
        #reader__dashboard_section,
        #reader__dashboard_section_csr,
        #reader__dashboard_section_swaplink,
        #reader__header_message,
        #reader__status_span,
        #reader__filescan_input,
        #reader__camera_permission_button {
            display: none !important;
        }

        /* iOS-специфічний клас — тільки коли обов'язково потрібно стримати fullscreen */
        body.is-ios #reader video,
        body.is-ios #reader canvas,
        body.is-ios #reader img {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
        }

        /* Android: мінімум втручання — нехай бібліотека сама керує video */
        body.is-android #reader video {
            max-width: 100% !important;
            max-height: 100% !important;
        }

        .error-flash {
            box-shadow: inset 0 0 30px rgba(255, 59, 48, 0.8) !important;
            border-bottom: 6px solid #ff3b30 !important;
        }

        .stats {
            padding: 8px 15px;
            background: #18222d;
            border-bottom: 1px solid #2a3a4d;
            flex-shrink: 0;
        }
        .stats h2 { color: #4caf50; margin: 0 0 3px 0; font-size: 18px; }
        .stats p { color: #aaa; margin: 0; font-size: 13px; }

        #codes-list {
            flex: 1 1 auto;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 8px 12px;
            background: #0f1720;
            text-align: left;
            min-height: 0;
        }
        .code-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            margin: 4px 0;
            background: #253344;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            animation: slideIn 0.2s ease-out;
        }
        .code-item.duplicate-flash {
            background: #5a1f1f;
            transition: background 0.5s;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .code-num { color: #2ea6ff; font-weight: bold; margin-right: 8px; }
        .code-text { flex-grow: 1; word-break: break-all; color: #fff; }
        .code-remove {
            background: #ff3b30; color: white;
            border: none; border-radius: 50%;
            width: 26px; height: 26px;
            font-size: 14px; cursor: pointer;
            flex-shrink: 0; margin-left: 8px;
            padding: 0; line-height: 1;
        }
        .empty-hint {
            color: #5a6a7a;
            text-align: center;
            padding: 20px;
            font-style: italic;
        }

        .btn {
            background: #2ea6ff; color: white; border: none;
            padding: 14px; font-size: 17px; border-radius: 10px;
            width: 92%; margin: 8px auto 20px auto;
            display: none; font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div id="reader"></div>

    <div class="stats">
        <h2 id="count-text">Відскановано: 0</h2>
        <p id="last-code">Наведіть рамку на код(и)</p>
    </div>

    <div id="codes-list">
        <div class="empty-hint">Поки що нічого не відскановано</div>
    </div>

    <button class="btn" id="send-btn" onclick="sendData()">📤 ПЕРЕДАТИ В БОТ</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // --- ДЕТЕКЦІЯ ПЛАТФОРМИ ---
        const ua = navigator.userAgent || '';
        const isIOS = /iPhone|iPad|iPod/i.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        const isAndroid = /Android/i.test(ua);
        document.body.classList.add(isIOS ? 'is-ios' : (isAndroid ? 'is-android' : 'is-other'));

        // --- МАКЕТ ---
        function updateLayout() {
            const vh = (tg.viewportStableHeight || tg.viewportHeight || window.innerHeight);
            const cameraHeight = Math.round(vh * 0.50);

            const reader = document.getElementById('reader');
            reader.style.height = cameraHeight + 'px';
            reader.style.maxHeight = cameraHeight + 'px';
            reader.style.minHeight = cameraHeight + 'px';

            document.body.style.height = vh + 'px';
        }

        updateLayout();
        tg.onEvent('viewportChanged', updateLayout);
        window.addEventListener('resize', updateLayout);
        window.addEventListener('orientationchange', () => setTimeout(updateLayout, 300));

        // MutationObserver тільки на iOS — на Android не треба, бо бібліотека сама керує розміром
        if (isIOS) {
            const reader = document.getElementById('reader');
            const observer = new MutationObserver(() => {
                const vh = (tg.viewportStableHeight || tg.viewportHeight || window.innerHeight);
                const cameraHeight = Math.round(vh * 0.50);
                if (reader.offsetHeight !== cameraHeight) {
                    reader.style.height = cameraHeight + 'px';
                }
            });
            observer.observe(reader, { attributes: true, attributeFilter: ['style'] });
        }

        // --- СКАНУВАННЯ ---
        let scannedList = [];
        let scannedSet = new Set();
        let lastErrorTime = 0;

        function normalize(code) {
            return code.replace(/\s+/g, '').toUpperCase();
        }

        function isUnwantedToken(sn) {
            if (!sn) return true;
            if (sn.length < 4) return true;
            if (!/\d/.test(sn)) return true;

            const lower = sn.toLowerCase();
            const urlSchemes = [
                'http://', 'https://', 'ftp://', 'ftps://',
                'mailto:', 'tel:', 'sms:', 'smsto:',
                'geo:', 'maps:',
                'wifi:', 'matmsg:', 'bitcoin:',
                'viber://', 'tg://', 'whatsapp://'
            ];
            for (const scheme of urlSchemes) {
                if (lower.startsWith(scheme)) return true;
            }

            if (/^begin:(vcard|vcalendar)/i.test(sn)) return true;
            if (/^mecard:/i.test(sn)) return true;
            if (/^www\./i.test(sn)) return true;
            if (/^[a-z0-9][a-z0-9-]*(\.[a-z0-9-]+)+\/\S*/i.test(sn)) return true;
            if (/^[a-z0-9][a-z0-9-]*\.(com|ua|net|org|io|me|ly|gg|ru|info|biz|app|dev|co|tv|cc|xyz|site|shop|store|online|link)(\/|$)/i.test(sn)) return true;

            return false;
        }

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'success') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(1000, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'error') {
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(200, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.3);
            }
        }

        function renderList() {
            const listDiv = document.getElementById('codes-list');
            if (scannedList.length === 0) {
                listDiv.innerHTML = '<div class="empty-hint">Поки що нічого не відскановано</div>';
                document.getElementById('send-btn').style.display = 'none';
                return;
            }
            listDiv.innerHTML = '';
            scannedList.forEach((code, idx) => {
                const item = document.createElement('div');
                item.className = 'code-item';
                item.dataset.code = normalize(code);
                item.innerHTML = `
                    <span class="code-num">${idx + 1}.</span>
                    <span class="code-text">${code}</span>
                    <button class="code-remove" data-code="${normalize(code).replace(/"/g,'&quot;')}">×</button>
                `;
                listDiv.appendChild(item);
            });
            listDiv.querySelectorAll('.code-remove').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    removeCodeByNormalized(e.currentTarget.dataset.code);
                });
            });
            listDiv.scrollTop = listDiv.scrollHeight;
            document.getElementById('send-btn').style.display = 'block';
        }

        function removeCodeByNormalized(normCode) {
            scannedList = scannedList.filter(c => normalize(c) !== normCode);
            scannedSet.delete(normCode);
            document.getElementById('count-text').innerText = "Відскановано: " + scannedList.length;
            renderList();
        }

        function flashDuplicate(normCode) {
            document.querySelectorAll('.code-item').forEach(item => {
                if (item.dataset.code === normCode) {
                    item.classList.add('duplicate-flash');
                    item.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    setTimeout(() => item.classList.remove('duplicate-flash'), 1000);
                }
            });
        }

        const formatsToSupport = [
            Html5QrcodeSupportedFormats.QR_CODE,
            Html5QrcodeSupportedFormats.EAN_13,
            Html5QrcodeSupportedFormats.EAN_8,
            Html5QrcodeSupportedFormats.CODE_128,
            Html5QrcodeSupportedFormats.CODE_39,
            Html5QrcodeSupportedFormats.CODE_93,
            Html5QrcodeSupportedFormats.UPC_A,
            Html5QrcodeSupportedFormats.UPC_E,
            Html5QrcodeSupportedFormats.ITF,
            Html5QrcodeSupportedFormats.DATA_MATRIX,
            Html5QrcodeSupportedFormats.PDF_417,
            Html5QrcodeSupportedFormats.AZTEC,
            Html5QrcodeSupportedFormats.CODABAR
        ];

        const html5QrCode = new Html5Qrcode("reader", {
            formatsToSupport: formatsToSupport,
            verbose: false
        });

        // --- КОНФІГ ПО ПЛАТФОРМАХ ---
        // Android має нативний BarcodeDetector і працює добре з ним.
        // iOS — ні, там кращий ZXing всередині бібліотеки.
        const config = {
            fps: isAndroid ? 10 : 15,
            qrbox: function(vw, vh) {
                return {
                    width: Math.floor(vw * 0.95),
                    height: Math.floor(vh * 0.55)
                };
            },
            aspectRatio: 1.7777,
            videoConstraints: {
                facingMode: { ideal: "environment" },
                width: { min: 1280, ideal: 1920 },
                height: { min: 720, ideal: 1080 },
                // focusMode підтримують не всі пристрої — кладемо в advanced
                // щоб відсутність не зламала getUserMedia
                advanced: [{ focusMode: "continuous" }]
            },
            experimentalFeatures: {
                // На Android ВМИКАЄМО нативний детектор — він швидший і точніший
                // На iOS ВИМИКАЄМО — там він глючить у Telegram WebApp
                useBarCodeDetectorIfSupported: isAndroid
            },
            disableFlip: true
        };

        html5QrCode.start(
            { facingMode: { ideal: "environment" } },
            config,
            (decodedText) => {
                let tokens = decodedText.split(/[\s,;]+/);

                let addedCount = 0;
                let duplicateNormCodes = [];
                let allWereLinks = tokens.every(t => {
                    const tt = t.trim();
                    return tt && isUnwantedToken(tt);
                });

                tokens.forEach(sn => {
                    sn = sn.trim();
                    if (isUnwantedToken(sn)) return;

                    const norm = normalize(sn);
                    if (!scannedSet.has(norm)) {
                        scannedSet.add(norm);
                        scannedList.push(sn);
                        addedCount++;
                    } else {
                        duplicateNormCodes.push(norm);
                    }
                });

                let now = Date.now();

                if (addedCount > 0) {
                    playSound('success');
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');

                    document.getElementById('count-text').innerText = "Відскановано: " + scannedList.length;

                    if (addedCount > 1) {
                        document.getElementById('last-code').innerText = `📦 Додано ${addedCount} шт. пакетом`;
                    } else {
                        document.getElementById('last-code').innerText = "✅ " + scannedList[scannedList.length - 1];
                    }
                    renderList();
                    return;
                }

                if (addedCount === 0 && now - lastErrorTime > 2000) {
                    lastErrorTime = now;

                    if (allWereLinks && tokens.length > 0) {
                        document.getElementById('last-code').innerText = "🔗 Посилання пропущено";
                        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                        return;
                    }

                    if (duplicateNormCodes.length > 0) {
                        playSound('error');
                        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                        document.getElementById('last-code').innerText = "⚠️ Вже є у списку";

                        let readerDiv = document.getElementById('reader');
                        readerDiv.classList.add('error-flash');
                        setTimeout(() => readerDiv.classList.remove('error-flash'), 500);

                        flashDuplicate(duplicateNormCodes[0]);
                    }
                }
            },
            (errorMessage) => {}
        ).catch((err) => {
            document.getElementById('last-code').innerText = "Помилка камери: " + err;
        });

        setTimeout(updateLayout, 500);
        setTimeout(updateLayout, 1500);
        setTimeout(updateLayout, 3000);

        function sendData() {
            if (scannedList.length > 0) {
                tg.sendData(scannedList.join('|'));
            }
        }
    </script>
</body>
</html>
