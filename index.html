<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Сканер Greentech</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background: #18222d; color: white; text-align: center; margin: 0; padding: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Блок камери: фіксована висота, щоб дати місце списку */
        #reader-wrapper { width: 100%; height: 45vh; background: #000; box-sizing: border-box; border-bottom: 3px solid #2ea6ff; transition: border 0.2s, box-shadow 0.2s; position: relative; overflow: hidden; flex-shrink: 0; }
        #reader { width: 100%; height: 100%; object-fit: cover; }
        
        /* Клас, який додає червону рамку при дублікаті */
        .error-flash { border: 6px solid #ff3b30 !important; box-shadow: inset 0 0 30px rgba(255, 59, 48, 0.8); }

        /* Статистика та список */
        .stats { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; background: #18222d; overflow: hidden; }
        
        /* Прокрутка для кодів */
        .codes-scroll { flex-grow: 1; overflow-y: auto; margin-top: 10px; padding-right: 5px; }
        
        /* Дизайн рядка в списку */
        .code-row { display: flex; justify-content: space-between; align-items: center; background: #243447; padding: 10px 15px; margin-bottom: 8px; border-radius: 8px; border-left: 3px solid #4caf50; font-family: monospace; font-size: 16px; word-break: break-all; text-align: left; }
        .del-btn { color: #ff3b30; font-size: 22px; font-weight: bold; cursor: pointer; padding-left: 15px; }

        /* Кнопка піднята вище */
        .btn { background: #2ea6ff; color: white; border: none; padding: 16px; font-size: 18px; border-radius: 10px; width: 90%; margin: 0 auto 20px auto; display: none; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 1000; flex-shrink: 0; }
    </style>
</head>
<body>
    <div id="reader-wrapper">
        <div id="reader"></div>
    </div>
    
    <div class="stats">
        <h2 id="count-text" style="color: #4caf50; margin: 0 0 5px 0;">Відскановано: 0</h2>
        <div id="codes-list" class="codes-scroll">
            <p style="color: #aaa; margin: 0;">Наведіть рамку на код(и)</p>
        </div>
    </div>
    
    <button class="btn" id="send-btn" onclick="sendData()">📤 ПЕРЕДАТИ В БОТ</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        let scannedCodes = []; // Масив для зручного видалення
        let lastErrorTime = 0; 
        
        // --- ГЕНЕРАТОР ЗВУКІВ ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'success') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(1000, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'error') {
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(200, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.3);
            }
        }
        // -----------------------

        // --- ВІДМАЛЬОВКА СПИСКУ ---
        function updateUI() {
            document.getElementById('count-text').innerText = "Відскановано: " + scannedCodes.length;
            const listDiv = document.getElementById('codes-list');
            const btn = document.getElementById('send-btn');
            
            if (scannedCodes.length === 0) {
                listDiv.innerHTML = "<p style='color: #aaa; margin: 0;'>Наведіть рамку на код(и)</p>";
                btn.style.display = "none";
            } else {
                listDiv.innerHTML = scannedCodes.map((code, index) => `
                    <div class="code-row">
                        <span>${code}</span>
                        <span class="del-btn" onclick="removeCode(${index})">✕</span>
                    </div>
                `).join('');
                btn.style.display = "block";
            }
        }

        window.removeCode = function(index) {
            scannedCodes.splice(index, 1);
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            updateUI();
        };

        const html5QrCode = new Html5Qrcode("reader");
        
        // --- ОПТИМІЗОВАНІ НАЛАШТУВАННЯ ---
        const config = { 
            fps: 30, 
            qrbox: function(vw, vh) { return { width: vw * 0.85, height: 120 }; }, // Стандартна рідна рамка
            experimentalFeatures: { useBarCodeDetectorIfSupported: true },
            videoConstraints: {
                facingMode: "environment",
                width: { ideal: 1920 }, // HD якість
                height: { ideal: 1080 }
            },
            formatsToSupport: [ 
                Html5QrcodeSupportedFormats.QR_CODE,
                Html5QrcodeSupportedFormats.CODE_128 
            ]
        };

        html5QrCode.start(
            { facingMode: "environment" }, 
            config,
            (decodedText) => {
                let serials = decodedText.split(/[\s,;|\n\r]+/);
                let addedAny = false;
                let hasDuplicates = false;

                serials.forEach(sn => {
                    sn = sn.trim();
                    if (/^https?:\/\/|www\./i.test(sn)) return;
                    if (!/\d/.test(sn)) return;
                    if (sn.length < 4) return;

                    if (sn) {
                        if (!scannedCodes.includes(sn)) {
                            scannedCodes.unshift(sn); 
                            addedAny = true;
                        } else {
                            hasDuplicates = true;
                        }
                    }
                });

                let now = Date.now();

                if (addedAny) {
                    playSound('success');
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    updateUI(); 
                } 
                else if (hasDuplicates && (now - lastErrorTime > 2000)) {
                    lastErrorTime = now;
                    playSound('error');
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                    
                    let readerDiv = document.getElementById('reader-wrapper');
                    readerDiv.classList.add('error-flash');
                    setTimeout(() => {
                        readerDiv.classList.remove('error-flash');
                    }, 500);
                }
            },
            (errorMessage) => {}
        ).catch((err) => {
            document.getElementById('codes-list').innerHTML = "<p style='color: #ff3b30;'>Помилка камери: " + err + "</p>";
        });

        function sendData() {
            if (scannedCodes.length > 0) {
                tg.sendData(scannedCodes.join('|'));
                tg.close();
            }
        }
    </script>
</body>
</html>
