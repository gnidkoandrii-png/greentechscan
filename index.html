<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Сканер Greentech</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- ЗАФІКСОВАНА ВЕРСІЯ: більше не буде "само поламалось" при оновленні бібліотеки -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        body {
            background: #18222d; color: white; text-align: center;
            margin: 0; padding: 0; font-family: sans-serif;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* Камера — фіксована висота (40% екрану), щоб список під нею мав місце */
        #reader {
            width: 100%;
            height: 40vh;
            background: #000;
            box-sizing: border-box;
            border-bottom: 3px solid #2ea6ff;
            transition: border 0.2s, box-shadow 0.2s;
        }

        .error-flash {
            border: 6px solid #ff3b30 !important;
            box-shadow: inset 0 0 30px rgba(255, 59, 48, 0.8);
        }

        /* Лічильник */
        .stats {
            padding: 8px 15px;
            background: #18222d;
            border-bottom: 1px solid #2a3a4d;
        }
        .stats h2 { color: #4caf50; margin: 0 0 3px 0; font-size: 18px; }
        .stats p { color: #aaa; margin: 0; font-size: 13px; }

        /* Список відсканованих кодів — скролиться */
        #codes-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 8px 12px;
            background: #0f1720;
            text-align: left;
        }
        .code-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            margin: 4px 0;
            background: #253344;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            animation: slideIn 0.2s ease-out;
        }
        .code-item.duplicate-flash {
            background: #5a1f1f;
            transition: background 0.5s;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .code-num { color: #2ea6ff; font-weight: bold; margin-right: 8px; }
        .code-text { flex-grow: 1; word-break: break-all; color: #fff; }
        .code-remove {
            background: #ff3b30; color: white;
            border: none; border-radius: 50%;
            width: 26px; height: 26px;
            font-size: 14px; cursor: pointer;
            flex-shrink: 0; margin-left: 8px;
            padding: 0; line-height: 1;
        }
        .empty-hint {
            color: #5a6a7a;
            text-align: center;
            padding: 20px;
            font-style: italic;
        }

        .btn {
            background: #2ea6ff; color: white; border: none;
            padding: 14px; font-size: 17px; border-radius: 10px;
            width: 92%; margin: 8px auto 50px auto;
            display: none; font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div id="reader"></div>

    <div class="stats">
        <h2 id="count-text">Відскановано: 0</h2>
        <p id="last-code">Наведіть рамку на код(и)</p>
    </div>

    <div id="codes-list">
        <div class="empty-hint">Поки що нічого не відскановано</div>
    </div>

    <button class="btn" id="send-btn" onclick="sendData()">📤 ПЕРЕДАТИ В БОТ</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Масив для збереження порядку + Set для швидкої перевірки унікальності
        let scannedList = [];
        let scannedSet = new Set();
        let lastErrorTime = 0;

        // --- ГЕНЕРАТОР ЗВУКІВ ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'success') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(1000, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'error') {
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(200, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.3);
            }
        }

        // --- ОНОВЛЕННЯ СПИСКУ НА ЕКРАНІ ---
        function renderList() {
            const listDiv = document.getElementById('codes-list');

            if (scannedList.length === 0) {
                listDiv.innerHTML = '<div class="empty-hint">Поки що нічого не відскановано</div>';
                document.getElementById('send-btn').style.display = 'none';
                return;
            }

            listDiv.innerHTML = '';
            scannedList.forEach((code, idx) => {
                const item = document.createElement('div');
                item.className = 'code-item';
                item.dataset.code = code;
                item.innerHTML = `
                    <span class="code-num">${idx + 1}.</span>
                    <span class="code-text">${code}</span>
                    <button class="code-remove" onclick="removeCode('${code.replace(/'/g, "\\'")}')">×</button>
                `;
                listDiv.appendChild(item);
            });

            // Автопрокрутка вниз, щоб було видно останній доданий
            listDiv.scrollTop = listDiv.scrollHeight;

            document.getElementById('send-btn').style.display = 'block';
        }

        // Видалення коду зі списку (якщо випадково відсканували зайве)
        function removeCode(code) {
            scannedList = scannedList.filter(c => c !== code);
            scannedSet.delete(code);
            document.getElementById('count-text').innerText = "Відскановано: " + scannedList.length;
            renderList();
        }

        // Підсвітити існуючий код червоним (при скануванні дубля)
        function flashDuplicate(code) {
            const items = document.querySelectorAll('.code-item');
            items.forEach(item => {
                if (item.dataset.code === code) {
                    item.classList.add('duplicate-flash');
                    item.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    setTimeout(() => item.classList.remove('duplicate-flash'), 1000);
                }
            });
        }
        // -----------------------

        // ЯВНО вказуємо формати, які потрібні складу
        const formatsToSupport = [
            Html5QrcodeSupportedFormats.QR_CODE,
            Html5QrcodeSupportedFormats.EAN_13,
            Html5QrcodeSupportedFormats.EAN_8,
            Html5QrcodeSupportedFormats.CODE_128,
            Html5QrcodeSupportedFormats.CODE_39,
            Html5QrcodeSupportedFormats.CODE_93,
            Html5QrcodeSupportedFormats.UPC_A,
            Html5QrcodeSupportedFormats.UPC_E,
            Html5QrcodeSupportedFormats.ITF,
            Html5QrcodeSupportedFormats.DATA_MATRIX
        ];

        const html5QrCode = new Html5Qrcode("reader", { formatsToSupport: formatsToSupport });

        const config = {
            fps: 10,
            qrbox: function(vw, vh) { return { width: vw * 0.85, height: Math.min(vh * 0.7, 250) }; },
            videoConstraints: {
                facingMode: { ideal: "environment" },
                width: { ideal: 1920 },
                height: { ideal: 1080 },
                advanced: [{ focusMode: "continuous" }]
            },
            experimentalFeatures: { useBarCodeDetectorIfSupported: true },
            rememberLastUsedCamera: true
        };

        html5QrCode.start(
            { facingMode: { ideal: "environment" } },
            config,
            (decodedText) => {
                let serials = decodedText.split(/\s+/);
                let addedCount = 0;
                let duplicateCodes = [];

                serials.forEach(sn => {
                    sn = sn.trim();
                    if (/^https?:\/\/|www\./i.test(sn)) return;
                    if (!/\d/.test(sn)) return;
                    if (sn.length < 4) return;

                    if (sn) {
                        if (!scannedSet.has(sn)) {
                            scannedSet.add(sn);
                            scannedList.push(sn);
                            addedCount++;
                        } else {
                            duplicateCodes.push(sn);
                        }
                    }
                });

                let now = Date.now();

                // НОВІ КОДИ ДОДАНО
                if (addedCount > 0) {
                    playSound('success');
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');

                    document.getElementById('count-text').innerText = "Відскановано: " + scannedList.length;

                    if (addedCount > 1) {
                        document.getElementById('last-code').innerText = `📦 Додано ${addedCount} шт. пакетом`;
                    } else {
                        document.getElementById('last-code').innerText = "✅ " + scannedList[scannedList.length - 1];
                    }

                    renderList();
                }

                // ВСІ КОДИ — ДУБЛІ (і минуло більше 2 сек від попередньої помилки)
                if (addedCount === 0 && duplicateCodes.length > 0 && (now - lastErrorTime > 2000)) {
                    lastErrorTime = now;
                    playSound('error');
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');

                    document.getElementById('last-code').innerText = "⚠️ Вже є: " + duplicateCodes[0];

                    // Миготіти камерою і підсвітити рядок у списку
                    let readerDiv = document.getElementById('reader');
                    readerDiv.classList.add('error-flash');
                    setTimeout(() => readerDiv.classList.remove('error-flash'), 500);

                    flashDuplicate(duplicateCodes[0]);
                }
            },
            (errorMessage) => {}
        ).catch((err) => {
            document.getElementById('last-code').innerText = "Помилка камери: " + err;
        });

        function sendData() {
            if (scannedList.length > 0) {
                // Порядок зберігається: передаємо у тому ж порядку, в якому сканували
                tg.sendData(scannedList.join('|'));
            }
        }
    </script>
</body>
</html>
