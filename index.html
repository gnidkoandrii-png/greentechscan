<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Сканер Greentech</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background: #18222d; color: white; text-align: center; margin: 0; padding: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Блок камери (45% екрана) */
        #reader-wrapper { width: 100%; height: 45vh; background: #000; border-bottom: 3px solid #2ea6ff; overflow: hidden; flex-shrink: 0; position: relative; }
        
        #reader { width: 100%; height: 100%; } 
        /* Це правило гарантує, що відео заповнить блок без спотворень на будь-якому телефоні */
        #reader video { object-fit: cover !important; width: 100% !important; height: 100% !important; }
        
        .error-flash { border-bottom: 6px solid #ff3b30 !important; box-shadow: inset 0 -10px 30px rgba(255, 59, 48, 0.6); }

        /* Блок статистики (55% екрана) */
        .stats { height: 55vh; padding: 15px; display: flex; flex-direction: column; background: #18222d; box-sizing: border-box; }
        
        .codes-scroll { flex-grow: 1; overflow-y: auto; margin-top: 10px; padding-right: 5px; }
        
        .code-row { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #243447; padding: 10px 15px; margin-bottom: 8px; 
            border-radius: 8px; border-left: 3px solid #4caf50;
            font-family: monospace; font-size: 16px; word-break: break-all; text-align: left;
        }
        
        .del-btn { color: #ff3b30; font-size: 22px; font-weight: bold; cursor: pointer; padding-left: 15px; }

        .btn { background: #2ea6ff; color: white; border: none; padding: 16px; font-size: 18px; border-radius: 10px; width: 100%; margin-top: 10px; display: none; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); flex-shrink: 0;}
    </style>
</head>
<body>
    <div id="reader-wrapper">
        <div id="reader"></div>
    </div>
    
    <div class="stats">
        <h2 id="count-text" style="color: #4caf50; margin: 0 0 5px 0;">Відскановано: 0</h2>
        
        <div id="codes-list" class="codes-scroll">
            <p style="color: #aaa; margin: 0;">Наведіть рамку на код(и)</p>
        </div>
        
        <button class="btn" id="send-btn" onclick="sendData()">📤 ПЕРЕДАТИ В БОТ</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        let scannedCodes = []; 
        let lastErrorTime = 0; 
        
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'success') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(1000, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'error') {
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(200, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.3);
            }
        }

        function updateList() {
            document.getElementById('count-text').innerText = "Відскановано: " + scannedCodes.length;
            const listContainer = document.getElementById('codes-list');
            const btn = document.getElementById('send-btn');

            if (scannedCodes.length === 0) {
                listContainer.innerHTML = "<p style='color: #aaa; margin: 0;'>Наведіть рамку на код(и)</p>";
                btn.style.display = "none";
            } else {
                btn.style.display = "block";
                listContainer.innerHTML = scannedCodes.map((code, index) => `
                    <div class="code-row">
                        <span>${code}</span>
                        <span class="del-btn" onclick="removeCode(${index})">✕</span>
                    </div>
                `).join('');
            }
        }

        window.removeCode = function(index) {
            scannedCodes.splice(index, 1);
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            updateList();
        }

        const html5QrCode = new Html5Qrcode("reader");
        
        const config = { 
            fps: 30, 
            qrbox: function(vw, vh) { 
                // РАМКА СТАЛА ШИРШОЮ: 95% від ширини екрана. Висота 140 пікселів.
                return { width: Math.floor(vw * 0.95), height: 140 }; 
            }, 
            formatsToSupport: [ 
                Html5QrcodeSupportedFormats.QR_CODE,
                Html5QrcodeSupportedFormats.CODE_128 
            ]
        };

        html5QrCode.start(
            { facingMode: "environment" }, 
            config,
            (decodedText) => {
                let serials = decodedText.split(/[\s,;|\n\r]+/);
                let addedAny = false;
                let hasDuplicates = false;

                serials.forEach(sn => {
                    sn = sn.trim();
                    if (/^https?:\/\/|www\./i.test(sn)) return;
                    if (!/\d/.test(sn)) return;
                    if (sn.length < 4) return;

                    if (sn) {
                        if (!scannedCodes.includes(sn)) {
                            scannedCodes.unshift(sn); 
                            addedAny = true;
                        } else {
                            hasDuplicates = true;
                        }
                    }
                });

                let now = Date.now();

                if (addedAny) {
                    playSound('success');
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    updateList(); 
                } 
                else if (hasDuplicates && (now - lastErrorTime > 2000)) {
                    lastErrorTime = now;
                    playSound('error');
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                    
                    let readerWrap = document.getElementById('reader-wrapper');
                    readerWrap.classList.add('error-flash');
                    setTimeout(() => {
                        readerWrap.classList.remove('error-flash');
                    }, 500);
                }
            },
            (errorMessage) => {}
        ).catch((err) => {
            // Додав більш зрозуміле повідомлення про помилку
            document.getElementById('codes-list').innerHTML = `<p style='color: #ff3b30;'>Помилка камери: ${err}</p><p style='color: #aaa; font-size: 12px;'>Переконайтеся, що Telegram має дозвіл на використання камери.</p>`;
        });

        function sendData() {
            if (scannedCodes.length > 0) {
                tg.sendData(scannedCodes.join('|'));
                tg.close();
            }
        }
    </script>
</body>
</html>
