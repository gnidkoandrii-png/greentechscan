<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Сканер Greentech</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            background: #18222d; color: white; text-align: center;
            margin: 0; padding: 0; font-family: sans-serif;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        #cam-wrapper {
            width: 100%; height: 45vh; flex-shrink: 0; background: #000;
            border-bottom: 3px solid #2ea6ff; overflow: hidden;
            position: relative; transition: border 0.2s, box-shadow 0.2s;
        }
        #video {
            width: 100%; height: 100%; object-fit: cover;
            display: block;
        }

        /* Рамка сканування */
        #scan-frame {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 200px; height: 200px;
            border: 2px solid rgba(46,166,255,0.7);
            border-radius: 12px;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.35);
            pointer-events: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        #scan-frame.hit {
            border-color: #4ecdc4;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.35), inset 0 0 20px rgba(78,205,196,0.4);
        }
        #scan-frame.dup {
            border-color: #ff3b30;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.35), inset 0 0 20px rgba(255,59,48,0.5);
        }

        /* Статус зверху */
        #status-label {
            position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.55); color: #aaa;
            font-size: 12px; padding: 3px 10px; border-radius: 20px;
            white-space: nowrap; pointer-events: none;
        }

        /* Кнопки поверх камери */
        #cam-controls {
            position: absolute; top: 10px; right: 10px;
            display: flex; flex-direction: column; gap: 8px; z-index: 10;
        }
        .cam-btn {
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(0,0,0,0.55); border: 2px solid rgba(255,255,255,0.25);
            color: white; font-size: 20px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s, border-color 0.2s;
        }
        .cam-btn.torch-on { background: rgba(255,220,0,0.75); border-color: #ffd700; }
        .cam-btn.hidden    { display: none; }

        /* Нижня панель */
        .stats {
            flex: 1; padding: 12px 12px 10px;
            display: flex; flex-direction: column; min-height: 0;
        }
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px; flex-shrink: 0;
        }
        #count-text { color: #4caf50; margin: 0; font-size: 18px; font-weight: bold; }
        .icon-btn {
            background: #2a3a4a; border: none; color: #ccc;
            border-radius: 8px; padding: 7px 13px; font-size: 18px; cursor: pointer;
        }
        .icon-btn:active { background: #1a2a3a; }

        .codes-scroll { flex: 1; overflow-y: auto; margin-bottom: 8px; padding-right: 4px; }

        .code-row {
            display: flex; justify-content: space-between; align-items: center;
            background: #243447; padding: 10px 15px; margin-bottom: 8px;
            border-radius: 8px; border-left: 3px solid #4caf50;
            font-family: monospace; font-size: 15px; word-break: break-all; text-align: left;
        }
        .del-btn {
            color: #ff3b30; font-size: 22px; font-weight: bold;
            cursor: pointer; padding-left: 15px; flex-shrink: 0;
        }

        .send-btn {
            background: #2ea6ff; color: white; border: none; padding: 16px;
            font-size: 18px; border-radius: 10px; width: 100%; display: none;
            font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); flex-shrink: 0;
        }

        /* Модальний ввід */
        #manual-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.65);
            display: none; align-items: flex-end; z-index: 100;
        }
        #manual-modal.open { display: flex; }
        .modal-box {
            background: #243447; width: 100%; padding: 20px;
            border-radius: 16px 16px 0 0; border-top: 2px solid #2ea6ff;
        }
        .modal-title { font-size: 15px; font-weight: bold; margin-bottom: 12px; color: #2ea6ff; }
        #manual-input {
            width: 100%; padding: 13px; font-size: 16px; font-family: monospace;
            background: #18222d; color: white; border: 2px solid #3a4a5a;
            border-radius: 8px; outline: none; margin-bottom: 12px; letter-spacing: 1px;
        }
        #manual-input:focus { border-color: #2ea6ff; }
        .modal-btns { display: flex; gap: 10px; }
        .modal-btns button {
            flex: 1; padding: 14px; border-radius: 8px; border: none;
            font-size: 16px; font-weight: bold; cursor: pointer;
        }
        .btn-cancel { background: #3a4a5a; color: #aaa; }
        .btn-add    { background: #2ea6ff; color: white; }

        #loader {
            position: absolute; inset: 0; background: #000;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 10px; color: #aaa; font-size: 14px;
        }
        .spinner {
            width: 36px; height: 36px; border: 3px solid #2a3a4a;
            border-top-color: #2ea6ff; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="cam-wrapper">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <div id="loader">
        <div class="spinner"></div>
        <span id="loader-text">Ініціалізація...</span>
    </div>

    <div id="scan-frame" style="display:none;"></div>
    <div id="status-label">Наведіть на код</div>

    <div id="cam-controls">
        <button class="cam-btn hidden" id="torch-btn" onclick="toggleTorch()" title="Ліхтарик">🔦</button>
        <button class="cam-btn" onclick="openManual()" title="Ввести вручну">⌨️</button>
    </div>
</div>

<div class="stats">
    <div class="top-bar">
        <h2 id="count-text">Відскановано: 0</h2>
        <button class="icon-btn" id="clear-btn" style="display:none" onclick="clearAll()">🗑</button>
    </div>
    <div id="codes-list" class="codes-scroll">
        <p style="color:#aaa;margin:0;">Наведіть рамку на код(и)</p>
    </div>
    <button class="send-btn" id="send-btn" onclick="sendData()">📤 НАДІСЛАТИ ДАНІ</button>
</div>

<div id="manual-modal">
    <div class="modal-box">
        <div class="modal-title">⌨️ Введіть серійний номер вручну</div>
        <input type="text" id="manual-input" placeholder="Серійний номер..."
               autocomplete="off" autocorrect="off" spellcheck="false">
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeManual()">Скасувати</button>
            <button class="btn-add"    onclick="addManual()">Додати</button>
        </div>
    </div>
</div>

<script>
(async () => {
    const tg = window.Telegram.WebApp;
    tg.expand();

    const video    = document.getElementById('video');
    const canvas   = document.getElementById('canvas');
    const ctx      = canvas.getContext('2d', { willReadFrequently: true });
    const loader   = document.getElementById('loader');
    const loaderTx = document.getElementById('loader-text');
    const frame    = document.getElementById('scan-frame');

    let scannedCodes  = [];
    let lastScanTime  = 0;
    let lastErrTime   = 0;
    const COOLDOWN    = 1500;
    let torchOn       = false;
    let videoTrack    = null;
    let scanActive    = true;

    /* ── Звук ─────────────────────────────────── */
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const actx = new AudioCtx();
    function beep(ok) {
        if (actx.state === 'suspended') actx.resume();
        const o = actx.createOscillator(), g = actx.createGain();
        o.connect(g); g.connect(actx.destination);
        if (ok) {
            o.type = 'sine'; o.frequency.value = 1000;
            g.gain.setValueAtTime(1, actx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.1);
            o.start(); o.stop(actx.currentTime + 0.1);
        } else {
            o.type = 'sawtooth'; o.frequency.value = 200;
            g.gain.setValueAtTime(1, actx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.3);
            o.start(); o.stop(actx.currentTime + 0.3);
        }
    }

    /* ── UI ───────────────────────────────────── */
    function updateUI() {
        const n = scannedCodes.length;
        document.getElementById('count-text').innerText = 'Відскановано: ' + n;
        const list    = document.getElementById('codes-list');
        const sendBtn = document.getElementById('send-btn');
        const clrBtn  = document.getElementById('clear-btn');
        if (n === 0) {
            list.innerHTML = "<p style='color:#aaa;margin:0;'>Наведіть рамку на код(и)</p>";
            sendBtn.style.display = clrBtn.style.display = 'none';
        } else {
            list.innerHTML = scannedCodes.map((c, i) => `
                <div class="code-row">
                    <span>${c}</span>
                    <span class="del-btn" onclick="removeCode(${i})">✕</span>
                </div>`).join('');
            sendBtn.style.display = clrBtn.style.display = 'block';
        }
    }
    window.removeCode = i => { scannedCodes.splice(i, 1); tg.HapticFeedback?.impactOccurred('light'); updateUI(); };
    function clearAll() { scannedCodes = []; tg.HapticFeedback?.impactOccurred('medium'); updateUI(); }

    function flashFrame(type) {
        frame.classList.remove('hit', 'dup');
        void frame.offsetWidth;
        frame.classList.add(type);
        setTimeout(() => frame.classList.remove(type), type === 'hit' ? COOLDOWN : 500);
    }

    function handleCode(text) {
        const now = Date.now();
        if (!text || text.length < 4) return;
        if (/^https?:\/\/|www\./i.test(text)) return;
        if (!/\d/.test(text)) return;

        if (scannedCodes.includes(text)) {
            if (now - lastErrTime > 2000) {
                lastErrTime = now;
                beep(false);
                tg.HapticFeedback?.notificationOccurred('error');
                flashFrame('dup');
            }
            return;
        }

        if (now - lastScanTime < COOLDOWN) return;

        lastScanTime = now;
        scannedCodes.unshift(text);
        beep(true);
        tg.HapticFeedback?.notificationOccurred('success');
        flashFrame('hit');
        updateUI();
    }

    /* ── Ініціалізація камери ─────────────────── */
    loaderTx.textContent = 'Запит доступу до камери...';
    let stream;
    try {
        stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
        });
    } catch(e) {
        loaderTx.textContent = 'Немає доступу до камери: ' + e.message;
        return;
    }

    video.srcObject = stream;
    await new Promise(r => video.onloadedmetadata = r);
    video.play();

    // Torch
    videoTrack = stream.getVideoTracks()[0];
    const caps = videoTrack.getCapabilities?.() || {};
    if (caps.torch) {
        document.getElementById('torch-btn').classList.remove('hidden');
    }

    loader.style.display = 'none';
    frame.style.display  = 'block';

    /* ── Вибір декодера ───────────────────────── */
    let decode; // async () => string | null

    // 1. Нативний BarcodeDetector (Android Chrome / Chromium) — найшвидший
    if ('BarcodeDetector' in window) {
        const formats = ['qr_code', 'ean_13', 'ean_8', 'code_128', 'code_39',
                         'code_93', 'data_matrix', 'upc_a', 'upc_e', 'itf'];
        let supported = [];
        try { supported = await BarcodeDetector.getSupportedFormats(); } catch(e) {}
        const use = formats.filter(f => supported.includes(f));
        const bd  = new BarcodeDetector({ formats: use.length ? use : ['qr_code', 'ean_13', 'code_128'] });
        document.getElementById('status-label').textContent = '⚡ Native decoder';
        decode = async () => {
            const res = await bd.detect(video);
            return res.length ? res[0].rawValue : null;
        };

    // 2. ZBar WASM — iOS / Firefox / інші
    } else {
        loaderTx.textContent = 'Завантаження ZBar...';
        loader.style.display = 'flex';
        frame.style.display  = 'none';

        let scanImageData;
        try {
            const mod = await import('https://cdn.jsdelivr.net/npm/@undecaf/zbar-wasm@0.9.15/dist/main.mjs');
            scanImageData = mod.scanImageData;
        } catch(e) {
            loaderTx.textContent = 'Помилка завантаження ZBar: ' + e.message;
            return;
        }

        loader.style.display = 'none';
        frame.style.display  = 'block';
        document.getElementById('status-label').textContent = '🔍 ZBar WASM';

        decode = async () => {
            if (video.videoWidth === 0) return null;
            canvas.width  = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const symbols = await scanImageData(imgData);
            return symbols.length ? symbols[0].decode() : null;
        };
    }

    /* ── Цикл сканування ──────────────────────── */
    let processing = false;
    async function scanLoop() {
        if (!scanActive) return;
        if (!processing && video.readyState >= 2) {
            processing = true;
            try {
                const result = await decode();
                if (result) handleCode(result.trim());
            } catch(e) {}
            processing = false;
        }
        requestAnimationFrame(scanLoop);
    }
    scanLoop();

    /* ── Ліхтарик ─────────────────────────────── */
    window.toggleTorch = async () => {
        if (!videoTrack) return;
        torchOn = !torchOn;
        try {
            await videoTrack.applyConstraints({ advanced: [{ torch: torchOn }] });
            document.getElementById('torch-btn').classList.toggle('torch-on', torchOn);
            tg.HapticFeedback?.impactOccurred('light');
        } catch(e) { torchOn = !torchOn; }
    };

    /* ── Ручний ввід ──────────────────────────── */
    window.openManual = () => {
        document.getElementById('manual-modal').classList.add('open');
        setTimeout(() => document.getElementById('manual-input').focus(), 100);
    };
    window.closeManual = () => {
        document.getElementById('manual-modal').classList.remove('open');
        document.getElementById('manual-input').value = '';
    };
    window.addManual = () => {
        const val = document.getElementById('manual-input').value.trim();
        if (val) handleCode(val);
        closeManual();
    };
    document.getElementById('manual-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') addManual();
    });

    /* ── Відправка ────────────────────────────── */
    window.sendData = () => {
        if (scannedCodes.length > 0) {
            tg.sendData(scannedCodes.join('|'));
            tg.close();
        }
    };

    window.clearAll = clearAll;

})();
</script>
</body>
</html>
