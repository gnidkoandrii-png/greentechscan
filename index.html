<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Greentech Terminal (Zebra UI)</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* Суворий промисловий дизайн */
        body { background: #000; color: #fff; margin: 0; padding: 0; font-family: "Courier New", Courier, monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Верхня панель (Статус бар термінала) */
        .terminal-header { background: #333; padding: 8px 15px; font-weight: bold; font-size: 14px; display: flex; justify-content: space-between; border-bottom: 2px solid #555; }
        .terminal-header span { color: #0f0; }

        /* Блок камери як у сканері */
        .camera-wrapper { position: relative; width: 100%; height: 40vh; background: #111; overflow: hidden; }
        #reader { width: 100%; height: 100%; object-fit: cover; }
        
        /* СТАТИЧНИЙ ЧЕРВОНИЙ ЛАЗЕР (Як у Zebra) */
        .laser-target {
            position: absolute; top: 50%; left: 10%; width: 80%; height: 120px;
            transform: translateY(-50%); border: 2px solid rgba(255, 0, 0, 0.3);
            pointer-events: none; box-sizing: border-box;
        }
        .laser-target::before {
            content: ""; position: absolute; top: 50%; left: -5%; width: 110%; height: 2px;
            background: rgba(255, 0, 0, 0.8); box-shadow: 0 0 8px red; pointer-events: none;
        }

        /* Підсвітка успіху/помилки на весь екран камери */
        .flash-success { box-shadow: inset 0 0 40px rgba(0, 255, 0, 0.6); }
        .flash-error { box-shadow: inset 0 0 40px rgba(255, 0, 0, 0.8); }

        /* Блок списку (Лог термінала) */
        .log-container { flex-grow: 1; padding: 10px; display: flex; flex-direction: column; background: #0a0a0a; border-top: 2px solid #333; }
        .stats-header { margin-bottom: 5px; padding-bottom: 5px; border-bottom: 1px dashed #444; }
        #status-text { color: #aaa; font-size: 14px; }
        
        #codes-list { flex-grow: 1; overflow-y: auto; padding: 5px 0; }
        .code-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 5px; border-bottom: 1px solid #222; }
        .code-text { color: #0f0; font-size: 16px; font-weight: bold; word-break: break-all; text-shadow: 0 0 2px #0f0; }
        
        /* Кнопка видалення (Хрестик) */
        .delete-btn { color: #ff3b30; background: #222; border: 1px solid #444; border-radius: 4px; padding: 5px 12px; font-size: 16px; font-weight: bold; cursor: pointer; text-shadow: none; }

        /* Промислова кнопка відправки */
        .action-panel { padding: 15px; background: #111; border-top: 2px solid #333; }
        .btn { background: #ffcc00; color: #000; border: none; padding: 18px; font-size: 18px; border-radius: 4px; width: 100%; font-weight: bold; font-family: "Courier New", Courier, monospace; text-transform: uppercase; display: none; }
        .btn:active { background: #e6b800; }
    </style>
</head>
<body>
    <div class="terminal-header">
        <div>Z-SCAN EMULATOR</div>
        <div>DATA: <span id="count-val">0</span></div>
    </div>

    <div class="camera-wrapper" id="cam-wrap">
        <div id="reader"></div>
        <div class="laser-target"></div>
    </div>
    
    <div class="log-container">
        <div class="stats-header">
            <span id="status-text">SYSTEM: READY. ALIGN BARCODE TO LASER.</span>
        </div>
        <div id="codes-list"></div>
    </div>

    <div class="action-panel">
        <button class="btn" id="send-btn" onclick="sendData()">UPLOAD DATA [ ^ ]</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.disableVerticalSwipes(); // Запобігає випадковому закриттю
        
        let scannedCodes = []; 
        let lastErrorTime = 0;

        // Термінальні звуки
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (type === 'success') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'error') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.8, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        function updateUI() {
            document.getElementById('count-val').innerText = scannedCodes.length;
            const listDiv = document.getElementById('codes-list');
            const btn = document.getElementById('send-btn');
            
            if (scannedCodes.length > 0) {
                btn.style.display = "block";
                listDiv.innerHTML = scannedCodes.map((code, index) => `
                    <div class="code-item">
                        <span class="code-text">> ${code}</span>
                        <div class="delete-btn" onclick="removeCode(${index})">✕</div>
                    </div>
                `).join('');
            } else {
                btn.style.display = "none";
                listDiv.innerHTML = "<div style='color:#555; margin-top:10px;'>NO DATA IN BUFFER...</div>";
            }
        }

        window.removeCode = function(index) {
            scannedCodes.splice(index, 1);
            updateUI();
        };

        const html5QrCode = new Html5Qrcode("reader");
        const config = { 
            fps: 30,
            qrbox: function(vw, vh) { 
                return { width: vw * 0.9, height: Math.min(vh * 0.45, 200) }; 
            },
            experimentalFeatures: { useBarCodeDetectorIfSupported: true },
            formatsToSupport: [ 
                Html5QrcodeSupportedFormats.QR_CODE, 
                Html5QrcodeSupportedFormats.CODE_128, 
                Html5QrcodeSupportedFormats.CODE_39, 
                Html5QrcodeSupportedFormats.EAN_13 
            ]
        };

        html5QrCode.start(
            { facingMode: "environment" }, 
            config,
            (decodedText) => {
                let serials = decodedText.split(/[\s,;|\n\r]+/);
                let addedAny = false;
                let hasDuplicates = false;

                serials.forEach(sn => {
                    sn = sn.trim();
                    if (/^https?:\/\/|www\./i.test(sn)) return; 
                    if (!/\d/.test(sn)) return; 
                    if (sn.length < 4) return;

                    if (!scannedCodes.includes(sn)) {
                        scannedCodes.unshift(sn);
                        addedAny = true;
                    } else {
                        hasDuplicates = true;
                    }
                });

                let now = Date.now();
                let camWrap = document.getElementById('cam-wrap');

                if (addedAny) {
                    playSound('success');
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    
                    document.getElementById('status-text').innerText = "SYSTEM: READ OK.";
                    document.getElementById('status-text').style.color = "#0f0";
                    
                    camWrap.classList.add('flash-success');
                    setTimeout(() => camWrap.classList.remove('flash-success'), 200);
                    
                    updateUI();
                } 
                else if (hasDuplicates && (now - lastErrorTime > 2000)) {
                    lastErrorTime = now;
                    playSound('error');
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                    
                    document.getElementById('status-text').innerText = "ERROR: DUPLICATE ENTRY.";
                    document.getElementById('status-text').style.color = "#ff3b30";
                    
                    camWrap.classList.add('flash-error');
                    setTimeout(() => camWrap.classList.remove('flash-error'), 400);
                }
            },
            (errorMessage) => {}
        ).catch((err) => {
            document.getElementById('status-text').innerText = "SYS_ERR: CAMERA FAIL.";
        });

        window.sendData = function() {
            if (scannedCodes.length > 0) {
                tg.sendData(scannedCodes.join('|'));
                tg.close();
            }
        }
        
        updateUI(); 
    </script>
</body>
</html>
