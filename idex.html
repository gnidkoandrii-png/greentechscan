<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Сканер Greentech</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background: #18222d; color: white; text-align: center; margin: 0; padding: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Блок камери з плавною зміною кольору для помилки */
        #reader { width: 100%; flex-grow: 1; background: #000; box-sizing: border-box; border-bottom: 3px solid #2ea6ff; transition: border 0.2s, box-shadow 0.2s; }
        
        /* Клас, який додає червону рамку при дублікаті */
        .error-flash { border: 6px solid #ff3b30 !important; box-shadow: inset 0 0 30px rgba(255, 59, 48, 0.8); }

        .stats { padding: 15px; height: 120px; display: flex; flex-direction: column; justify-content: center; background: #18222d; }
        
        /* Кнопка піднята вище, щоб обійти рекламу tiiny.host */
        .btn { background: #2ea6ff; color: white; border: none; padding: 16px; font-size: 18px; border-radius: 10px; width: 90%; margin: 0 auto 60px auto; display: none; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 1000;}
    </style>
</head>
<body>
    <div id="reader"></div>
    <div class="stats">
        <h2 id="count-text" style="color: #4caf50; margin: 0 0 5px 0;">Відскановано: 0</h2>
        <p id="last-code" style="color: #aaa; margin: 0;">Наведіть рамку на код(и)</p>
    </div>
    <button class="btn" id="send-btn" onclick="sendData()">📤 ПЕРЕДАТИ В БОТ</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let scannedCodes = new Set();
        let lastErrorTime = 0; // Запобіжник для спаму помилками
        
        // --- ГЕНЕРАТОР ЗВУКІВ ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'success') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(1000, audioCtx.currentTime); // Високий пік
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'error') {
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(200, audioCtx.currentTime); // Низький звук
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.3);
            }
        }
        // -----------------------

        const html5QrCode = new Html5Qrcode("reader");
        const config = { 
            fps: 15, 
            qrbox: function(vw, vh) { return { width: vw * 0.85, height: Math.min(vh * 0.4, 300) }; }
        };

        html5QrCode.start(
            { facingMode: "environment" }, 
            config,
            (decodedText) => {
                let serials = decodedText.split(/\s+/);
                let addedAny = false;
                let hasDuplicates = false;

                serials.forEach(sn => {
                    sn = sn.trim();
                    if (/^https?:\/\/|www\./i.test(sn)) return;
                    if (!/\d/.test(sn)) return;
                    if (sn.length < 4) return;

                    if (sn) {
                        if (!scannedCodes.has(sn)) {
                            scannedCodes.add(sn);
                            addedAny = true;
                        } else {
                            hasDuplicates = true;
                        }
                    }
                });

                let now = Date.now();

                // ЯКЩО ДОДАНО НОВИЙ КОД:
                if (addedAny) {
                    playSound('success');
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    
                    document.getElementById('count-text').innerText = "Відскановано: " + scannedCodes.size;
                    
                    if (serials.length > 1) {
                        document.getElementById('last-code').innerText = "📦 Додано пакетом";
                    } else {
                        let lastValid = Array.from(scannedCodes).pop();
                        document.getElementById('last-code').innerText = "Останній: " + lastValid;
                    }
                    
                    document.getElementById('send-btn').style.display = "block";
                } 
                // ЯКЩО КОД ВЖЕ БУВ (і пройшло більше 2 секунд з попереднього сигналу помилки)
                else if (hasDuplicates && (now - lastErrorTime > 2000)) {
                    lastErrorTime = now;
                    playSound('error');
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                    
                    document.getElementById('last-code').innerText = "⚠️ ЦЕЙ КОД ВЖЕ ВІДСКАНОВАНО!";
                    
                    // Блимаємо червоною рамкою
                    let readerDiv = document.getElementById('reader');
                    readerDiv.classList.add('error-flash');
                    setTimeout(() => {
                        readerDiv.classList.remove('error-flash');
                    }, 500);
                }
            },
            (errorMessage) => {}
        ).catch((err) => {
            document.getElementById('last-code').innerText = "Помилка камери: " + err;
        });

        function sendData() {
            if (scannedCodes.size > 0) {
                tg.sendData(Array.from(scannedCodes).join('|'));
            }
        }
    </script>
</body>
</html>
